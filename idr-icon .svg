<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Institute of Digital Risk icon">

  <!-- =============================================
       IDR CUBE ICON
       Three visible faces of an isometric cube.
       • Top face  = orange  → energy, signal, alert
       • Left face = black   → structure, authority
       • Right face = #444   → depth, shadow, resilience
       Centre diamond + dot represent the risk core.
       ============================================= -->

  <!-- Top face (orange) -->
  <polygon points="32,6  56,20  32,34  8,20" fill="#ff6b00"/>

  <!-- Left face (black) -->
  <polygon points="8,20  32,34  32,58  8,44" fill="#111111"/>

  <!-- Right face (dark grey) -->
  <polygon points="56,20  32,34  32,58  56,44" fill="#444444"/>

  <!-- Inner diamond on top — layered risk -->
  <polygon
    points="32,14  44,21  32,28  20,21"
    fill="none"
    stroke="#ffffff"
    stroke-width="1.2"
    opacity="0.55"/>

  <!-- Risk nucleus dot -->
  <circle cx="32" cy="21" r="2.5" fill="#ffffff" opacity="0.8"/>

</svg>
